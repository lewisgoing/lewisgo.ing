<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <linearGradient id="wavyGradient" gradientTransform="rotate(90)">
      <stop offset="0%" stop-color="#F6DC68" />
      <stop offset="25%" stop-color="#CC70CE" />
      <stop offset="50%" stop-color="#A55FDF" />
      <stop offset="75%" stop-color="#748CEE" />
      <stop offset="100%" stop-color="#678EF2" />
    </linearGradient>
    <filter id="wave" x="0" y="0" width="200%" height="200%">
      <feTurbulence id="turbulence">
        <animate attributeName="baseFrequency" from="0.02" to="0.04" dur="10s" repeatCount="indefinite" />
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" scale="20" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#wavyGradient)" filter="url(#wave)" />
</svg>
